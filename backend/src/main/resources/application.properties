# ==============================================================
# HostelHub Backend Configuration
# ==============================================================

# Database Connection (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/hostelhub
spring.datasource.username=postgres
spring.datasource.password=Shreya
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# App Configurations
app.backend-url=http://localhost:8080
app.upload-dir=uploads

# JWT Configurations (256-bit strong secret)
app.jwt-secret=9a67a8698c42b039473fbcdb3cb306a4b18c0c4e1f7481c4e976db553a123bc6
app.jwt-expiration-ms=86400000

# Cloudinary Configuration (Optional)
# Fill these in to store images on Cloudinary.
# If left empty, files will be saved in the local 'uploads' directory.
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=
